<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Empire Credits Store</title>
    <style>
        :root { --primary: #00e676; --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        
        .input-box { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 400px; text-align: center; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input[type="text"] { width: 90%; padding: 12px; margin-top: 15px; border-radius: 6px; border: 1px solid #444; background: #111; color: var(--primary); font-size: 1rem; text-align: center; outline: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: var(--card); border-radius: 15px; padding: 30px; text-align: center; border: 1px solid #333; transition: 0.3s ease; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 230, 118, 0.2); }
        .amount { font-size: 2rem; font-weight: 800; margin-bottom: 5px; }
        .price { color: #888; font-size: 1.1rem; margin-bottom: 25px; }
        
        .buy-btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .buy-btn:hover { background: #00c853; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Driving Empire Shop</h1>
        <p>Enter your username and select a package</p>
    </div>

    <!-- Username Input -->
    <div class="input-box">
        <label style="font-weight: bold; color: #aaa;">ROBLOX USERNAME</label><br>
        <input type="text" id="robloxUser" placeholder="Enter Username..." autocomplete="off">
    </div>

    <!-- Shop Grid -->
    <div class="grid">
        <!-- 1 Million -->
        <div class="card">
            <div class="amount">$1,000,000</div>
            <div class="price">100 Robux</div>
            <!-- REPLACE LINK BELOW -->
            <button class="buy-btn" onclick="handlePurchase('1 Million', '100', 'https://create.roblox.com/dashboard/creations/experiences/6838083324/passes/1435816766/configure')">BUY NOW</button>
        </div>

        <!-- 5 Million -->
        <div class="card">
            <div class="amount">$5,000,000</div>
            <div class="price">500 Robux</div>
            <!-- REPLACE LINK BELOW -->
            <button class="buy-btn" onclick="handlePurchase('5 Million', '500', 'https://create.roblox.com/dashboard/creations/experiences/6838083324/passes/1436092638/configure')">BUY NOW</button>
        </div>

        <!-- 10 Million -->
        <div class="card">
            <div class="amount">$10,000,000</div>
            <div class="price">1,000 Robux</div>
            <!-- REPLACE LINK BELOW -->
            <button class="buy-btn" onclick="handlePurchase('10 Million', '1,000', 'https://create.roblox.com/dashboard/creations/experiences/6838083324/passes/1436092638/configure')">BUY NOW</button>
        </div>
    </div>

    <script>
        function handlePurchase(cashAmount, robuxPrice, gamepassURL) {
            const user = document.getElementById('robloxUser').value;

            // 1. Check for Username
            if (!user || user.length < 3) {
                alert("Please enter your Roblox Username first!");
                return;
            }

            // 2. PASTE YOUR WEBHOOK HERE
            const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1489060265743089817/w-rxkqTWfbnoOSp8nnKlZk7-7oLj5g8RwgbF3LQOEox2faMSaDK0AWw9ZecyqjcLelJ_"; 

            // 3. Send data to Discord
            const payload = {
                username: "Store Order Log",
                embeds: [{
                    title: "🛒 NEW PENDING ORDER",
                    color: 3066993,
                    fields: [
                        { name: "User", value: user, inline: true },
                        { name: "Package", value: cashAmount + " Cash", inline: true },
                        { name: "Price", value: robuxPrice + " Robux", inline: true }
                    ],
                    footer: { text: "User redirected to specific Game Pass" },
                    timestamp: new Date()
                }]
            };

            // Sends to discord, but doesn't wait (so redirect is instant)
            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(err => console.error("Webhook failed:", err));

            // 4. Redirect to the unique Game Pass URL
            window.location.href = gamepassURL;
        }
    </script>

</body>
</html>
